name: RDMA (software)

# Exercises the ibverbs stack by
# standing up a virtual software RDMA device on a standard GitHub-hosted
# ubuntu-22.04 runner, then building with -DYLT_ENABLE_IBV=ON.
#
# GitHub-hosted runners currently use Azure kernels where rdma_rxe is not
# always packaged, even after installing linux-modules-extra-$(uname -r). The
# same extra package does include siw (Soft-iWARP), so the setup below tries
# SoftRoCE first and falls back to Soft-iWARP while still requiring a real
# ibverbs-visible RDMA device before tests run.

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '17 17 * * *'   # daily ~01:15 CST, off-the-hour
  workflow_dispatch:
  workflow_call:

concurrency:
  group: rdma-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  ccache: ON

jobs:
  rdma_software:
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            openssl libssl-dev \
            libibverbs-dev ibverbs-utils librdmacm-dev rdma-core \
            iproute2 ninja-build

      - name: Set up software RDMA device
        run: |
          sudo apt-get install -y "linux-modules-extra-$(uname -r)"
          sudo modprobe ib_core

          DEV=$(ip route show default 2>/dev/null | awk '{print $5; exit}')
          if [ -z "$DEV" ]; then
            DEV=$(ip -o link show up | awk -F': ' '$2 != "lo" {sub(/@.*/, "", $2); print $2; exit}')
          fi
          if [ -z "$DEV" ]; then
            echo "::error::No usable netdev found for software RDMA"
            exit 1
          fi

          if sudo modprobe rdma_rxe 2>/tmp/modprobe-rdma-rxe.log; then
            RDMA_DEV=rxe0
            RDMA_TYPE=rxe
            RUN_RDMA_TESTS=1
          elif sudo modprobe siw 2>/tmp/modprobe-siw.log; then
            RDMA_DEV=siw0
            RDMA_TYPE=siw
            RUN_RDMA_TESTS=0
          else
            echo "::error::Neither rdma_rxe nor siw is available on this runner kernel"
            echo "rdma_rxe:"
            cat /tmp/modprobe-rdma-rxe.log || true
            echo "siw:"
            cat /tmp/modprobe-siw.log || true
            find "/lib/modules/$(uname -r)/kernel/drivers/infiniband" -type f | sort || true
            exit 1
          fi

          echo "Binding ${RDMA_DEV} (${RDMA_TYPE}) to netdev: ${DEV}"
          sudo rdma link add "$RDMA_DEV" type "$RDMA_TYPE" netdev "$DEV"
          echo "YLT_RDMA_DEV_NAME=${RDMA_DEV}" >> "$GITHUB_ENV"
          echo "YLT_RDMA_DEV_TYPE=${RDMA_TYPE}" >> "$GITHUB_ENV"
          echo "YLT_RUN_RDMA_TESTS=${RUN_RDMA_TESTS}" >> "$GITHUB_ENV"

          # Verify — hard fail if the target RDMA device did not come up so we
          # never run the test suite against a broken/missing/default device.
          lsmod | grep -E 'rdma_rxe|siw|ib_core|ib_uverbs' || true
          rdma link show
          ibv_devices
          ibv_devinfo
          # ibv_devices -l prints two header lines plus one line per device.
          test "$(ibv_devices -l 2>/dev/null | wc -l)" -gt 2
          ibv_devices -l 2>/dev/null | awk '{print $1}' | grep -Fx "$RDMA_DEV"
          if [ "$RUN_RDMA_TESTS" != "1" ]; then
            echo "::notice::Soft-iWARP is available, but these ibverbs socket tests hand-wire RC QPs and require SoftRoCE for runtime coverage. This job will build ibverbs targets only."
          fi

      - name: Install ninja-build tool
        uses: seanmiddleditch/gha-setup-ninja@master

      - name: ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ github.job }}

      - name: Configure
        run: |
          CXX=g++ CC=gcc
          cmake -B ${{github.workspace}}/build -G Ninja \
                -DCMAKE_BUILD_TYPE=Debug \
                -DYLT_ENABLE_IBV=ON \
                -DYLT_ENABLE_SSL=OFF \
                -DUSE_CCACHE=${{env.ccache}}

      - name: Build ibverbs targets
        run: |
          cmake --build ${{github.workspace}}/build --config Debug --target \
            ibverbs_test \
            ibverbs_pressure_test

      - name: Run ibverbs tests
        if: env.YLT_RUN_RDMA_TESTS == '1'
        working-directory: ${{github.workspace}}/build
        run: ctest -R ibverbs -C Debug -j 1 -V

      - name: Skip ibverbs runtime tests
        if: env.YLT_RUN_RDMA_TESTS != '1'
        run: |
          echo "Skipping ibverbs runtime tests for ${YLT_RDMA_DEV_NAME} (${YLT_RDMA_DEV_TYPE}); ibverbs targets were built successfully."
