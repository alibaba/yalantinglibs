name: macOS 15

on:
  workflow_call:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

concurrency:
  group: mac-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  mac_clang:
    strategy:
      matrix:
        mode: [ Debug ]  #mode: [Release, Debug]
        ssl: [ ON, OFF ]

    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

     # - name: SetUp HomeBrew
     #   id: set-up-homebrew
     #   uses: Homebrew/actions/setup-homebrew@master

      - name: Install Dependencies
        run: HOMEBREW_NO_INSTALL_CLEANUP=1 HOMEBREW_NO_INSTALLED_DEPENDENTS_CHECK=1 brew install openssl@3 ninja

      - name: ccache
        uses: hendrikmuhs/ccache-action@v1.2.23
        with:
          key: ${{ github.job }}-${{ matrix.mode}}-ssl( ${{ matrix.ssl}} )

      - name: Configure CMake
        run: OPENSSL_ROOT_DIR="$(brew --prefix openssl@3)" CXX=clang++ CC=clang cmake -B ${{github.workspace}}/build -G Ninja -DCMAKE_BUILD_TYPE=${{matrix.mode}} -DYLT_ENABLE_SSL=${{matrix.ssl}} -DUSE_CCACHE=ON

      - name: Build
        run: cmake --build ${{github.workspace}}/build --config ${{matrix.mode}}

      - name: Test
        working-directory: ${{github.workspace}}/build
        run: ctest -C ${{matrix.mode}} -j 1 -V
