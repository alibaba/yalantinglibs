name: Windows Server 2022

on:
  workflow_call:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  windows_msvc:
    runs-on: windows-2022

    strategy:
      matrix:
        mode: [ Release ] #[ Release, Debug ] #Debug not support ccache
        #https://github.com/ccache/ccache/wiki/MS-Visual-Studio
        #https://github.com/ccache/ccache/issues/1040
        arch: [ amd64, x86 ] #[ amd64,x86 ]
        ssl: [ OFF ] #[ ON, OFF ]

    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Enable Developer Command Prompt
        uses: step-security/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.arch }}
      - name: Install build tools
        run: choco install ninja ccache -y
      - name: ccache
        uses: hendrikmuhs/ccache-action@v1.2.23
        with:
          key: ${{ github.job }}-${{ matrix.mode}}-ssl( ${{ matrix.ssl}} )-arch-${{ matrix.arch}}
      - name: Configure CMake
        run: cmake -B ${{github.workspace}}\build -G Ninja -DCMAKE_BUILD_TYPE=${{ matrix.mode }} -DYLT_ENABLE_SSL=${{matrix.ssl}} -DUSE_CCACHE=ON
      - name: Build
        run: cmake --build ${{github.workspace}}\build
      - name: Diagnose coro_http_test
        working-directory: ${{github.workspace}}\build
        shell: pwsh
        run: |
          $exe = Join-Path $PWD "output/tests/coro_http_test.exe"
          $testDir = Join-Path $PWD "src/coro_http/tests"
          if (!(Test-Path $exe)) {
            Write-Error "missing test executable: $exe"
            exit 1
          }
          if (Test-Path $testDir) {
            Set-Location $testDir
          }

          $cases = & $exe --list-test-cases --no-colors --no-version |
            Where-Object {
              $_ -and
              ($_ -notmatch '^\[doctest\]') -and
              ($_ -notmatch '^=+$')
            } |
            ForEach-Object { $_.Trim() } |
            Where-Object { $_ -ne "" }

          foreach ($case in $cases) {
            Write-Host "===== BEGIN coro_http_test case: $case ====="
            $psi = [System.Diagnostics.ProcessStartInfo]::new()
            $psi.FileName = $exe
            $psi.UseShellExecute = $false
            $psi.ArgumentList.Add("--test-case=$case")
            $psi.ArgumentList.Add("--duration")
            $psi.ArgumentList.Add("--no-colors")
            $psi.ArgumentList.Add("--no-version")
            $process = [System.Diagnostics.Process]::Start($psi)

            if (!$process.WaitForExit(120000)) {
              Write-Error "coro_http_test timed out in case: $case"
              Stop-Process -Id $process.Id -Force -ErrorAction SilentlyContinue
              exit 1
            }

            if ($process.ExitCode -ne 0) {
              Write-Error "coro_http_test failed in case: $case, exit code: $($process.ExitCode)"
              exit $process.ExitCode
            }
            Write-Host "===== END coro_http_test case: $case ====="
          }
